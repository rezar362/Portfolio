<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reza Roshani — ML, Quant Finance & Optimization</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #fafaf8;
    --accent: #c8f557;
    --accent-dark: #9bc43a;
    --gray-100: #f4f4f0;
    --gray-200: #e8e8e2;
    --gray-400: #a8a89e;
    --gray-600: #6b6b63;
    --gray-800: #2e2e2a;
    --tag-bg: #f0f0ea;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--white);
    color: var(--black);
    line-height: 1.6;
    overflow-x: hidden;
  }
  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.2rem 3rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
  }
  .nav-logo {
    font-weight: 800; font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--black);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gray-600); text-decoration: none;
  }
  .nav-links a:hover { color: var(--black); }

  /* Rest of your original styles (unchanged) */
  .hero-name {
    font-family: Georgia, 'DM Serif Display', serif;
    font-size: clamp(3rem, 5vw, 5.5rem);
    line-height: 1.0;
    letter-spacing: -0.03em;
  }
  .section-title, .project-title, .nav-logo, .skill-group h3 {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 700;
  }

  /* Keep all your other original CSS exactly the same from here down */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 5rem; }
  .hero-left { padding: 6rem 3rem 4rem 3rem; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--gray-200); }
  .hero-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 1.5rem; }
  .hero-tagline { font-size: 0.85rem; color: var(--gray-600); line-height: 1.8; max-width: 380px; margin-bottom: 3rem; }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em; text-decoration: none; border-radius: 2px; transition: all 0.2s; cursor: pointer; border: none; }
  .btn-primary { background: var(--black); color: var(--accent); }
  .btn-primary:hover { background: var(--gray-800); }
  .btn-secondary { background: transparent; color: var(--black); border: 1px solid var(--gray-200); }
  .btn-secondary:hover { border-color: var(--black); }
  .hero-right { padding: 6rem 3rem 4rem 3rem; display: flex; flex-direction: column; justify-content: center; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--gray-200); }
  .stat-box { padding: 2rem; border-right: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200); }
  .stat-box:nth-child(2n) { border-right: none; }
  .stat-box:nth-child(n+3) { border-bottom: none; }
  .stat-number { font-size: 2.8rem; line-height: 1; color: var(--black); margin-bottom: 0.4rem; }
  .stat-number span { color: var(--accent-dark); }
  .stat-label { font-size: 0.7rem; font-weight: 400; color: var(--gray-400); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.5; }

  section { padding: 6rem 3rem; }
  .section-header { display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 4rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-200); }
  .section-num { font-size: 0.7rem; color: var(--gray-400); letter-spacing: 0.1em; }
  .section-title { font-size: 1.8rem; letter-spacing: -0.02em; }

  .projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--gray-200); border: 1px solid var(--gray-200); }
  .project-card { background: var(--white); padding: 2.5rem; display: flex; flex-direction: column; transition: background 0.2s; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
  .project-card:hover { background: var(--gray-100); }
  .project-tag { display: inline-block; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-600); background: var(--tag-bg); padding: 0.3rem 0.7rem; border-radius: 2px; margin-bottom: 1.5rem; align-self: flex-start; }
  .project-title { font-size: 1.2rem; letter-spacing: -0.02em; margin-bottom: 0.8rem; line-height: 1.2; }
  .project-desc { font-size: 0.78rem; color: var(--gray-600); line-height: 1.8; flex: 1; margin-bottom: 1.5rem; }
  .project-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .tech-tag { font-size: 0.65rem; color: var(--gray-600); background: var(--tag-bg); padding: 0.25rem 0.6rem; border-radius: 2px; }
  .project-result { font-size: 0.75rem; font-weight: 500; color: var(--black); padding-top: 1rem; border-top: 1px solid var(--gray-200); }
  .project-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; font-weight: 500; color: var(--gray-600); text-decoration: none; letter-spacing: 0.05em; margin-top: 1rem; }
  .project-link:hover { color: var(--black); }
  .project-link::after { content: '→'; }

  #skills { background: var(--gray-100); }
  .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
  .skill-group h3 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--accent); display: inline-block; }
  .skill-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .skill-list li { font-size: 0.78rem; color: var(--gray-600); padding-left: 1rem; position: relative; }
  .skill-list li::before { content: '—'; position: absolute; left: 0; color: var(--accent-dark); }

  #contact { background: var(--black); color: var(--white); display: grid; grid-template-columns: 1fr 1fr; }
  .contact-left { padding: 6rem 3rem; border-right: 1px solid var(--gray-800); }
  .contact-tagline { font-size: clamp(2rem, 3vw, 3.5rem); line-height: 1.1; color: var(--white); margin-top: 2rem; }
  .contact-right { padding: 6rem 3rem; display: flex; flex-direction: column; justify-content: center; gap: 1.5rem; }
  .contact-link { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; border: 1px solid var(--gray-800); text-decoration: none; color: var(--white); font-size: 0.8rem; letter-spacing: 0.05em; transition: all 0.2s; border-radius: 2px; }
  .contact-link:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    background: var(--black); color: var(--gray-600); padding: 1.5rem 3rem;
    font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--gray-800);
  }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; }
    .hero-left { border-right: none; padding: 6rem 1.5rem 2rem; }
    .hero-right { padding: 2rem 1.5rem 4rem; }
    section { padding: 4rem 1.5rem; }
    .projects-grid { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: 1fr; }
    #contact { grid-template-columns: 1fr; }
    .contact-left { border-right: none; padding: 4rem 1.5rem 2rem; }
    .contact-right { padding: 2rem 1.5rem 4rem; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
